name: Proxy Auto System
on:
  schedule:
    - cron: '*/30 * * * *' # Setiap 30 menit (Direkomendasikan)
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'
      - name: Install
        run: pip install -r requirements.txt
      - name: Run
        run: python main.py
      - name: Save
        run: |
          git config --local user.email "bot@github.com"
          git config --local user.name "ProxyBot"
          git add results/
          git commit -m "Auto Update: $(date)" || exit 0
          git push
